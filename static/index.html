<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>God-Mode Dashboard</title>
    <style>
        body { font-family: sans-serif; background: #121212; padding: 15px; color: #e0e0e0; margin: 0; }
        .grid { display: grid; grid-template-columns: 1fr; gap: 20px; }
        @media(min-width: 768px) { .grid { grid-template-columns: 1fr 1fr; } }
        
        .card { background: #1e1e1e; padding: 20px; border-radius: 8px; border: 1px solid #333; }
        input, button, select { padding: 12px; margin: 8px 0; width: 100%; box-sizing: border-box; font-size: 16px; border-radius: 6px; border: 1px solid #555; background: #2a2a2a; color: white;}
        button { background: #bb86fc; color: black; border: none; cursor: pointer; font-weight: bold;}
        button:hover:not(:disabled) { background: #9965f4; }
        button:disabled { background: #555; cursor: not-allowed; color: #aaa; }
        .btn-danger { background: #ff5252; color: white; margin-top: 20px; }
        .btn-danger:hover:not(:disabled) { background: #ff1744; }
        .btn-round { background: #03dac6; color: black; }
        
        .truth-box { background: #3a0000; padding: 15px; border-left: 4px solid #ff5252; margin-top: 10px; border-radius: 4px; color: #ffb3b3; white-space: pre-wrap; line-height: 1.5;}
        .table-container { overflow-x: auto; margin-top: 10px; }
        table { width: 100%; text-align: left; border-collapse: collapse; min-width: 400px; }
        th, td { padding: 10px; border-bottom: 1px solid #444; font-size: 14px; }
        
        .killer { color: #ff5252; font-weight: bold; }
        .dead { text-decoration: line-through; color: #666; background-color: #1a1a1a; }
        
        .role-option { display: flex; justify-content: space-between; align-items: center; background: #2a2a2a; padding: 10px; border-radius: 6px; margin-bottom: 8px; border: 1px solid #444;}
        .role-option label { font-weight: bold; font-size: 14px;}
        .role-option input[type="checkbox"] { width: auto; transform: scale(1.3); }
        .role-option input[type="number"] { width: 60px; padding: 5px; text-align: center; margin: 0; }
        
        .link-wrapper { display: flex; gap: 10px; align-items: center; background: #00332a; padding: 10px; border: 2px dashed #03dac6; border-radius: 6px; margin-top: 10px; }
        .link-input { flex-grow: 1; background: transparent; border: none; color: #03dac6; font-weight: bold; font-size: 14px; outline: none; padding: 0; margin: 0; }
        .copy-btn { width: auto; padding: 10px 15px; margin: 0; background: #03dac6; color: black; border-radius: 4px; font-size: 14px; }
        .spinner { display: inline-block; width: 20px; height: 20px; border: 3px solid rgba(255,255,255,.3); border-radius: 50%; border-top-color: #fff; animation: spin 1s ease-in-out infinite; vertical-align: middle; margin-right: 10px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .toast { visibility: hidden; min-width: 250px; background-color: #03dac6; color: #000; text-align: center; border-radius: 4px; padding: 16px; position: fixed; z-index: 1000; left: 50%; bottom: 30px; transform: translateX(-50%); font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }

        /* Tabs */
        .tab-btn { flex: 1; padding: 10px; border: none; font-weight: bold; cursor: pointer; border-radius: 6px; }
        .tab-active { background: #bb86fc; color: black; }
        .tab-inactive { background: #2a2a2a; color: #aaa; border: 1px solid #444; }
        .template-card { background: #2a2a2a; padding: 15px; border-radius: 6px; margin-bottom: 10px; border-left: 4px solid #03dac6; }
    </style>
</head>
<body>
    <div id="toast" class="toast">Action Successful</div>
    
    <h1 style="font-size: 24px; color: #bb86fc;">👁️ God-Mode Dashboard</h1>
    <input type="password" id="adminPass" placeholder="Admin Password (from .env)" style="max-width: 100%; margin-bottom: 20px;">

    <div class="grid">
        <div>
            <div class="card">
                <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                    <button id="btnForge" class="tab-btn tab-active" onclick="switchTab('forge')">✨ AI Forge</button>
                    <button id="btnLibrary" class="tab-btn tab-inactive" onclick="switchTab('library')">📚 Template Library</button>
                </div>

                <div id="viewForge">
                    <h3 style="margin-top: 0; color: #bb86fc;">Generate New Theme</h3>
                    <input type="text" id="theme" placeholder="Theme">
                    <input type="number" id="playerCount" value="6" onchange="updateAccompliceLimit()">
                    <div class="role-option"><label>🤝 Accomplices</label><input type="number" id="accCount" value="0" min="0" max="2"></div>
                    <div class="role-option"><label>🥴 Include "The Drunk"</label><input type="checkbox" id="incDrunk"></div>
                    <div class="role-option"><label>🔍 Include "The Investigator"</label><input type="checkbox" id="incInvestigator"></div>
                    <button id="generateBtn" onclick="createGame()">Generate & Play</button>
                </div>

                <div id="viewLibrary" style="display: none;">
                    <h3 style="margin-top: 0; color: #03dac6;">Saved Campaigns</h3>
                    <button onclick="loadTemplates()" style="background: transparent; border: 1px solid #03dac6; color: #03dac6; margin-bottom: 15px;">↻ Refresh Library</button>
                    <div id="templateList" style="max-height: 400px; overflow-y: auto;">
                        <em style="color: #666;">Loading templates...</em>
                    </div>
                </div>

                <div id="roomLinkContainer" style="display: none; margin-top: 15px; border-top: 1px solid #333; padding-top: 15px;">
                    <p style="font-size: 14px; color: #aaa; margin-bottom: 5px;">Share this link with your friends:</p>
                    <div class="link-wrapper">
                        <input type="text" id="roomLinkInput" class="link-input" readonly>
                        <button onclick="copyRoomLink()" class="copy-btn">📋 Copy</button>
                    </div>
                </div>
            </div>

            <div class="card" style="margin-top: 20px;">
                <h3 style="margin-top: 0; color: #bb86fc;">2. Control Room</h3>
                <input type="text" id="gameId" placeholder="Active Game ID">
                
                <div id="roundControls" style="text-align: center; margin-top: 15px; padding: 15px; background: #2a2a2a; border-radius: 6px; border: 1px solid #444;">
                    <p style="margin: 0; font-size: 14px; color: #aaa;">Current Round</p>
                    <p id="currentRoundDisplay" style="font-size: 32px; color: #03dac6; font-weight: bold; margin: 5px 0;">0</p>
                    
                    <button id="advanceRoundBtn" onclick="advanceRound()" style="background: #03dac6; color: black; margin-top: 10px;">Advance to Round 1</button>
                    <button id="revealTruthBtn" onclick="endGame()" class="btn-danger" style="display: none; margin-top: 10px;">🛑 Reveal Truth (End Game)</button>
                </div>
                
                <button onclick="fetchGodMode()" style="background: transparent; border: 1px solid #03dac6; color: #03dac6; margin-top: 15px;">↻ Refresh Roster</button>
            </div>
        </div>

        <div class="card">
            <h3 style="margin-top: 0; color: #bb86fc;">The Master Truth</h3>
            <div id="truthContent" class="truth-box">Load a game to see the secret plot...</div>

            <h3 style="margin-top: 30px; color: #03dac6;">Live Player Roster</h3>
            <div class="table-container">
                <table>
                    <thead><tr><th>Player (Real Name)</th><th>Role</th><th>Voted For</th></tr></thead>
                    <tbody id="rosterBody"><tr><td colspan="3">No game loaded.</td></tr></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        window.onload = () => {
            const savedId = localStorage.getItem("activeGameId");
            if (savedId) { document.getElementById('gameId').value = savedId; fetchGodMode(); }
            loadTemplates();
        };

        function showToast(msg) {
            const toast = document.getElementById("toast");
            toast.innerText = msg;
            toast.className = "toast show";
            setTimeout(() => { toast.className = toast.className.replace("show", ""); }, 3000);
        }

        function switchTab(tab) {
            document.getElementById('viewForge').style.display = tab === 'forge' ? 'block' : 'none';
            document.getElementById('viewLibrary').style.display = tab === 'library' ? 'block' : 'none';
            document.getElementById('btnForge').className = tab === 'forge' ? 'tab-btn tab-active' : 'tab-btn tab-inactive';
            document.getElementById('btnLibrary').className = tab === 'library' ? 'tab-btn tab-active' : 'tab-btn tab-inactive';
            if(tab === 'library') loadTemplates();
        }

        async function loadTemplates() {
            const pass = document.getElementById('adminPass').value;
            if(!pass) return;
            const res = await fetch('/admin/templates', { headers: { 'x-admin-token': pass }});
            if(!res.ok) return;
            const data = await res.json();
            
            const list = document.getElementById('templateList');
            list.innerHTML = "";
            data.templates.forEach(t => {
                let tags = `👤 ${t.player_count}`;
                if(t.accomplice_count > 0) tags += ` | 🤝 ${t.accomplice_count}`;
                if(t.has_drunk) tags += ` | 🥴 Drunk`;
                if(t.has_investigator) tags += ` | 🔍 Inv.`;

                list.innerHTML += `
                    <div class="template-card">
                        <strong style="color: #03dac6; font-size: 18px;">${t.theme_title}</strong><br>
                        <small style="color: #aaa;">${tags}</small>
                        <p style="font-size: 14px; margin: 8px 0; color: #ddd;">${t.short_description}</p>
                        <button onclick="spawnTemplate('${t.id}')" style="background: #03dac6; color: black; padding: 8px; font-size: 14px;">▶️ Spawn Instantly</button>
                    </div>
                `;
            });
        }

        async function spawnTemplate(templateId) {
            const pass = document.getElementById('adminPass').value;
            const res = await fetch(`/admin/create-from-template/${templateId}`, { method: 'POST', headers: { 'x-admin-token': pass }});
            const data = await res.json();
            
            localStorage.setItem("activeGameId", data.game_id);
            document.getElementById('gameId').value = data.game_id;
            document.getElementById('roomLinkContainer').style.display = 'block';
            document.getElementById('roomLinkInput').value = data.room_url;
            await fetchGodMode();
            showToast("✅ Template Spawned Instantly!");
        }

        function updateAccompliceLimit() {
            const pCount = document.getElementById('playerCount').value;
            const aCount = document.getElementById('accCount');
            if (pCount > 6) { aCount.max = 2; } else { aCount.max = 1; if(aCount.value > 1) aCount.value = 1; }
        }

        async function createGame() {
            const btn = document.getElementById('generateBtn');
            const pass = document.getElementById('adminPass').value;
            btn.disabled = true; btn.innerHTML = `<span class="spinner"></span> Generating Roles...`;
            try {
                const res = await fetch(`/admin/create-game?theme=${document.getElementById('theme').value}&player_count=${document.getElementById('playerCount').value}&accomplice_count=${document.getElementById('accCount').value}&include_drunk=${document.getElementById('incDrunk').checked}&include_investigator=${document.getElementById('incInvestigator').checked}`, { method: 'POST', headers: { 'x-admin-token': pass }});
                const data = await res.json();
                localStorage.setItem("activeGameId", data.game_id);
                document.getElementById('gameId').value = data.game_id;
                document.getElementById('roomLinkContainer').style.display = 'block';
                document.getElementById('roomLinkInput').value = data.room_url;
                await fetchGodMode();
                showToast("✅ Game Generated Successfully");
            } catch (err) { alert(err); } finally { btn.disabled = false; btn.innerText = "Generate & Play"; }
        }

        function copyRoomLink() {
            const copyText = document.getElementById("roomLinkInput");
            copyText.select(); navigator.clipboard.writeText(copyText.value);
            showToast("📋 Link Copied to Clipboard!");
        }

        async function advanceRound() {
            const pass = document.getElementById('adminPass').value;
            const gameId = document.getElementById('gameId').value;
            const currentRound = parseInt(document.getElementById('currentRoundDisplay').innerText);
            await fetch(`/admin/release-round/${gameId}/${currentRound + 1}`, { method: 'POST', headers: { 'x-admin-token': pass }});
            showToast(`🚀 Round ${currentRound + 1} Pushed! Player devices updated.`);
            fetchGodMode();
        }

        async function endGame() {
            if(confirm("End the game and show the solution to all players?")) {
                const pass = document.getElementById('adminPass').value;
                await fetch(`/admin/end-game/${document.getElementById('gameId').value}`, { method: 'POST', headers: { 'x-admin-token': pass }});
                showToast("🛑 Game Ended! Scoreboards released.");
                fetchGodMode();
            }
        }

        async function fetchGodMode() {
            const pass = document.getElementById('adminPass').value;
            const gameId = document.getElementById('gameId').value;
            if(!gameId) return;
            localStorage.setItem("activeGameId", gameId);

            const res = await fetch(`/admin/game/${gameId}`, { headers: { 'x-admin-token': pass }});
            const data = await res.json();
            
            const round = data.game.current_round || 0;
            document.getElementById('currentRoundDisplay').innerText = round;
            const advanceBtn = document.getElementById('advanceRoundBtn');
            const revealBtn = document.getElementById('revealTruthBtn');

            if (data.game.status === 'finished') {
                advanceBtn.style.display = "none"; revealBtn.style.display = "none";
                document.getElementById('currentRoundDisplay').innerText = "Game Over";
            } else if (round < 3) {
                advanceBtn.style.display = "block"; revealBtn.style.display = "none";
                advanceBtn.innerText = `Advance to Round ${round + 1}`;
            } else {
                advanceBtn.style.display = "none"; revealBtn.style.display = "block";
            }
            
            const story = JSON.parse(data.game.master_story);
            document.getElementById('truthContent').innerHTML = `
                <strong style="color: #03dac6; font-size: 18px;">${data.game.theme_title || 'Mystery'}</strong><br>
                <em style="color: #aaa;">${data.game.short_description || ''}</em><br><br>
                <strong style="color: #ff5252;">Background:</strong><br>${story.background}<br><br>
                <strong style="color: #ff5252;">The Murder:</strong><br>${story.the_murder}<br><br>
                <strong style="color: #ff5252;">The Solution:</strong><br>${story.the_solution}
            `;

            const tbody = document.getElementById('rosterBody');
            tbody.innerHTML = "";
            data.players.forEach(p => {
                let role = "Innocent";
                if (p.is_killer) role = "🔪 Killer"; else if (p.is_accomplice) role = "🤝 Accomplice"; else if (p.is_investigator) role = "🔍 Investigator"; else if (p.is_drunk) role = "🥴 Drunk (False Clues)";
                const deadClass = p.is_dead && data.game.current_round >= p.death_round ? 'dead' : '';
                tbody.innerHTML += `<tr class="${deadClass}"><td><strong>${p.character_name}</strong><br><small style="color: #aaa;">${p.claimed_by_user || 'Empty'}</small></td><td class="${p.is_killer ? 'killer' : ''}">${role}</td><td>${p.voted_for || 'Voting...'}</td></tr>`;
            });
        }
    </script>
</body>
</html>
