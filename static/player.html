<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whodunit</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #0d0d0f; --surface: #16161a; --surface2: #1e1e24;
            --border: #2a2a32; --border2: #383844;
            --text: #e8e8f0; --muted: #6b6b80;
            --accent: #9d7cff; --accent2: #6db8ff;
            --danger: #ff5c5c; --success: #4dd89e;
            --warn: #ffb347; --teal: #2dd4bf;
            --sans: 'DM Sans', sans-serif; --mono: 'DM Mono', monospace;
        }
        body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; line-height: 1.5; padding-bottom: 80px; }

        /* Header */
        .top-bar { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; border-bottom: 1px solid var(--border); background: var(--surface); position: sticky; top: 0; z-index: 50; }
        .top-bar-left { display: flex; flex-direction: column; }
        .game-title { font-family: var(--mono); font-size: 12px; color: var(--accent); letter-spacing: 0.06em; }
        .char-label { font-size: 16px; font-weight: 600; color: var(--text); margin-top: 1px; }
        .sync-status { font-family: var(--mono); font-size: 11px; color: var(--muted); }

        /* Layout */
        .page { max-width: 520px; margin: 0 auto; padding: 16px; }

        /* Cards */
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 12px; }
        .card-title { font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }

        /* Alert banners */
        .alert { border-radius: 10px; padding: 14px 16px; margin-bottom: 12px; border-left: 3px solid; }
        .alert-killer   { background: rgba(255,92,92,0.07);   border-color: var(--danger);  color: var(--danger); }
        .alert-evil     { background: rgba(255,179,71,0.07);  border-color: var(--warn);    color: var(--warn); }
        .alert-special  { background: rgba(109,184,255,0.07); border-color: var(--accent2); color: var(--accent2); }
        .alert-paranoid { background: rgba(255,179,71,0.07);  border-color: var(--warn);    color: var(--warn); }
        .alert-dead     { background: rgba(255,92,92,0.05);   border-color: var(--danger);  color: var(--text); }
        .alert-fool     { background: rgba(255,92,92,0.07);   border-color: var(--danger);  color: var(--danger); }
        .alert-title { font-weight: 700; font-size: 14px; margin-bottom: 4px; }
        .alert-body { font-size: 13px; line-height: 1.5; opacity: 0.9; }
        .secret-pill { display: inline-block; margin-top: 8px; padding: 5px 10px; background: rgba(0,0,0,0.3); border-radius: 6px; font-size: 13px; font-weight: 600; color: var(--text); border: 1px solid rgba(255,255,255,0.08); }

        /* Role sheet */
        .role-text { font-size: 13px; line-height: 1.7; color: #ccc; white-space: pre-wrap; }

        /* Clue items */
        .clue-item { padding: 10px 12px; background: var(--surface2); border-radius: 8px; margin-bottom: 8px; border-left: 3px solid var(--accent); font-size: 13px; line-height: 1.5; }
        .clue-item:last-child { margin-bottom: 0; }
        .clue-round { font-family: var(--mono); font-size: 10px; color: var(--muted); margin-bottom: 3px; text-transform: uppercase; letter-spacing: 0.07em; }
        .clue-empty { color: var(--muted); font-size: 13px; font-style: italic; }

        /* Public clue */
        .public-clue { padding: 12px 14px; background: rgba(255,179,71,0.06); border: 1px solid rgba(255,179,71,0.2); border-radius: 8px; margin-bottom: 8px; }
        .public-clue-label { font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--warn); margin-bottom: 4px; }
        .public-clue-text { font-size: 13px; color: var(--text); line-height: 1.5; }

        /* Ghost clue */
        .ghost-item { padding: 10px 12px; background: rgba(45,212,191,0.05); border-left: 3px solid var(--teal); border-radius: 8px; margin-bottom: 8px; font-size: 13px; line-height: 1.5; }
        .ghost-from { font-size: 11px; color: var(--teal); font-weight: 600; margin-bottom: 3px; text-transform: uppercase; letter-spacing: 0.06em; }

        /* Notebook */
        .notebook-entry { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); }
        .notebook-entry:last-child { border-bottom: none; }
        .nb-info { flex: 1; min-width: 0; }
        .nb-name { font-weight: 600; font-size: 13px; }
        .nb-desc { font-size: 11px; color: var(--muted); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .nb-dead { opacity: 0.4; }
        .nb-status { display: flex; gap: 5px; flex-shrink: 0; }
        .status-btn { width: 28px; height: 28px; border-radius: 6px; border: 1px solid var(--border2); background: var(--surface2); cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
        .status-btn:hover { border-color: var(--border); background: var(--border2); }
        .status-btn.active-sus     { background: rgba(255,92,92,0.15);  border-color: var(--danger); }
        .status-btn.active-alright { background: rgba(77,216,158,0.15); border-color: var(--success); }

        /* Action panels (killer, poisoner, spy, exile) */
        .action-panel { border-radius: 10px; padding: 14px 16px; margin-bottom: 12px; border: 1px solid; }
        .panel-killer   { border-color: rgba(255,92,92,0.3);   background: rgba(255,92,92,0.04); }
        .panel-poisoner { border-color: rgba(157,124,255,0.3); background: rgba(157,124,255,0.04); }
        .panel-spy      { border-color: rgba(109,184,255,0.3); background: rgba(109,184,255,0.04); }
        .panel-exile    { border-color: rgba(255,179,71,0.3);  background: rgba(255,179,71,0.04); }
        .panel-ghost    { border-color: rgba(45,212,191,0.3);  background: rgba(45,212,191,0.04); }
        .panel-title { font-size: 13px; font-weight: 700; margin-bottom: 4px; }
        .panel-killer   .panel-title { color: var(--danger);  }
        .panel-poisoner .panel-title { color: var(--accent);  }
        .panel-spy      .panel-title { color: var(--accent2); }
        .panel-exile    .panel-title { color: var(--warn);    }
        .panel-ghost    .panel-title { color: var(--teal);    }
        .panel-desc { font-size: 12px; color: var(--muted); margin-bottom: 12px; line-height: 1.5; }

        /* Select */
        select { width: 100%; background: var(--surface2); border: 1px solid var(--border2); color: var(--text); padding: 9px 12px; border-radius: 7px; font-size: 14px; font-family: var(--sans); outline: none; margin-bottom: 10px; }
        select:focus { border-color: var(--accent); }

        /* Buttons */
        .btn { display: flex; align-items: center; justify-content: center; gap: 6px; width: 100%; padding: 10px 14px; font-family: var(--sans); font-size: 13px; font-weight: 600; border: none; border-radius: 8px; cursor: pointer; transition: all 0.15s; }
        .btn-killer   { background: rgba(255,92,92,0.15);   color: var(--danger);  border: 1px solid rgba(255,92,92,0.3); }
        .btn-killer:hover   { background: rgba(255,92,92,0.25); }
        .btn-poisoner { background: rgba(157,124,255,0.15); color: var(--accent);  border: 1px solid rgba(157,124,255,0.3); }
        .btn-poisoner:hover { background: rgba(157,124,255,0.25); }
        .btn-spy      { background: rgba(109,184,255,0.15); color: var(--accent2); border: 1px solid rgba(109,184,255,0.3); }
        .btn-spy:hover      { background: rgba(109,184,255,0.25); }
        .btn-exile    { background: rgba(255,179,71,0.15);  color: var(--warn);    border: 1px solid rgba(255,179,71,0.3); }
        .btn-exile:hover    { background: rgba(255,179,71,0.25); }
        .btn-ghost    { background: rgba(45,212,191,0.15);  color: var(--teal);    border: 1px solid rgba(45,212,191,0.3); }
        .btn-ghost:hover    { background: rgba(45,212,191,0.25); }
        .btn-vote     { background: var(--accent); color: #0d0d0f; }
        .btn-vote:hover     { background: #b89aff; }
        .btn-vote:disabled  { background: var(--border2); color: var(--muted); cursor: not-allowed; }
        .confirm-msg { font-size: 12px; font-weight: 600; margin-top: 8px; text-align: center; }

        /* Exile tally */
        .exile-tally { font-family: var(--mono); font-size: 12px; color: var(--muted); margin-top: 8px; }
        .exile-bar { height: 4px; background: var(--border2); border-radius: 2px; margin-top: 6px; overflow: hidden; }
        .exile-bar-fill { height: 100%; background: var(--warn); border-radius: 2px; transition: width 0.3s; }

        /* Waiting screen */
        .waiting-card { text-align: center; padding: 40px 24px; }
        .waiting-icon { font-size: 40px; margin-bottom: 16px; }
        .waiting-title { font-size: 20px; font-weight: 600; margin-bottom: 6px; }
        .waiting-desc { font-size: 13px; color: var(--muted); margin-bottom: 24px; line-height: 1.5; }
        .waiting-char { display: inline-block; padding: 10px 20px; background: rgba(157,124,255,0.1); border: 1px solid rgba(157,124,255,0.25); border-radius: 8px; font-weight: 600; font-size: 15px; color: var(--accent); margin-bottom: 20px; }
        .waiting-stats { display: flex; gap: 10px; justify-content: center; }
        .stat-pill { padding: 5px 12px; background: var(--surface2); border: 1px solid var(--border2); border-radius: 6px; font-size: 12px; color: var(--muted); }

        /* Story section */
        .story-block + .story-block { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }
        .story-label { font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 5px; }
        .story-text { font-size: 13px; line-height: 1.65; color: var(--text); white-space: pre-wrap; }

        /* Finished screen */
        .winner-banner { text-align: center; padding: 20px; border-radius: 12px; margin-bottom: 16px; font-size: 20px; font-weight: 700; }
        .win-innocent { background: rgba(77,216,158,0.1); border: 1px solid rgba(77,216,158,0.3); color: var(--success); }
        .win-killer   { background: rgba(255,92,92,0.1);  border: 1px solid rgba(255,92,92,0.3);  color: var(--danger); }

        .recap-card { background: rgba(157,124,255,0.04); border: 1px solid rgba(157,124,255,0.2); border-radius: 12px; padding: 16px; margin-bottom: 12px; }
        .recap-text { font-size: 13px; line-height: 1.85; color: #ccc; font-style: italic; white-space: pre-wrap; }

        .vote-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
        .vote-row:last-child { border-bottom: none; }
        .vote-tick { font-size: 15px; flex-shrink: 0; }
        .vote-voter { font-weight: 600; flex: 1; }
        .vote-target { color: var(--muted); }

        .identity-row { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); }
        .identity-row:last-child { border-bottom: none; }
        .id-name { font-weight: 600; flex: 1; }
        .id-player { font-size: 11px; color: var(--muted); margin-top: 1px; }
        .role-pill { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 4px; white-space: nowrap; }
        .rp-killer       { background: rgba(255,92,92,0.1);   color: var(--danger);  border: 1px solid rgba(255,92,92,0.25); }
        .rp-accomplice   { background: rgba(255,179,71,0.1);  color: var(--warn);    border: 1px solid rgba(255,179,71,0.25); }
        .rp-poisoner     { background: rgba(157,124,255,0.1); color: var(--accent);  border: 1px solid rgba(157,124,255,0.25); }
        .rp-investigator { background: rgba(109,184,255,0.1); color: var(--accent2); border: 1px solid rgba(109,184,255,0.25); }
        .rp-drunk        { background: rgba(255,179,71,0.07); color: var(--warn);    border: 1px solid rgba(255,179,71,0.18); }
        .rp-paranoid     { background: rgba(157,124,255,0.07);color: var(--accent);  border: 1px solid rgba(157,124,255,0.18); }
        .rp-spy          { background: rgba(109,184,255,0.07);color: var(--accent2); border: 1px solid rgba(109,184,255,0.18); }
        .rp-fool         { background: rgba(255,92,92,0.07);  color: var(--danger);  border: 1px solid rgba(255,92,92,0.18); }
        .rp-innocent     { background: var(--surface2); color: var(--muted); border: 1px solid var(--border2); }

        /* Sync bar */
        .sync-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface); border-top: 1px solid var(--border); padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; z-index: 50; }
        .sync-bar-left { font-family: var(--mono); font-size: 11px; color: var(--muted); }
        .sync-btn { background: transparent; border: 1px solid var(--border2); color: var(--muted); padding: 6px 14px; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; font-family: var(--sans); transition: all 0.15s; }
        .sync-btn:hover { color: var(--text); border-color: var(--text); }
        .progress-bar { height: 2px; background: var(--border); border-radius: 1px; margin-top: 4px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--accent); border-radius: 1px; transition: width 1s linear; }

        .loading { text-align: center; padding: 60px 24px; color: var(--muted); font-size: 14px; }
    </style>
</head>
<body>

<!-- Top bar -->
<div class="top-bar">
    <div class="top-bar-left">
        <span class="game-title" id="topGameTitle">🕵️ WHODUNIT</span>
        <span class="char-label" id="topCharName">—</span>
    </div>
    <span class="sync-status" id="syncStatus">Connecting…</span>
</div>

<div class="page">
    <div id="loadingView" class="loading">Loading your identity…</div>
    <div id="mainView" style="display:none;"></div>
</div>

<!-- Sync bar -->
<div class="sync-bar">
    <div class="sync-bar-left">
        <div id="syncLabel">Auto-sync in <span id="syncCountdown">180</span>s</div>
        <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:100%"></div></div>
    </div>
    <button class="sync-btn" onclick="fetchData()">↻ Sync now</button>
</div>

<script>
const urlParams  = new URLSearchParams(window.location.search);
const accessKey  = urlParams.get('key');
const SYNC_SECS  = 180; // 3 minutes
let countdown    = SYNC_SECS;
let syncTimer    = null;
let countdownInt = null;

// ── Auto-sync ──────────────────────────────────────────────────────────────
function startAutoSync() {
    clearInterval(syncTimer);
    clearInterval(countdownInt);
    countdown = SYNC_SECS;

    syncTimer = setInterval(() => {
        fetchData();
    }, SYNC_SECS * 1000);

    countdownInt = setInterval(() => {
        countdown = Math.max(0, countdown - 1);
        document.getElementById('syncCountdown').innerText = countdown;
        document.getElementById('progressFill').style.width = ((countdown / SYNC_SECS) * 100) + '%';
        if (countdown === 0) countdown = SYNC_SECS;
    }, 1000);
}

// ── Main fetch ─────────────────────────────────────────────────────────────
async function fetchData() {
    if (!accessKey) {
        document.getElementById('loadingView').innerText = 'Invalid link. Check your access key.';
        return;
    }
    try {
        const res  = await fetch(`/player/dashboard/${accessKey}`);
        if (!res.ok) throw new Error(`Server error ${res.status}`);
        const data = await res.json();
        countdown  = SYNC_SECS; // reset countdown after successful fetch
        document.getElementById('syncStatus').innerText = `Synced ${new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}`;
        render(data);
    } catch(e) {
        document.getElementById('syncStatus').innerText = 'Sync failed';
    }
}

// ── Render ─────────────────────────────────────────────────────────────────
function render(data) {
    document.getElementById('loadingView').style.display = 'none';
    document.getElementById('mainView').style.display    = 'block';
    document.getElementById('topGameTitle').innerText    = data.theme_title || '🕵️ WHODUNIT';
    document.getElementById('topCharName').innerText     = data.character_name || '—';

    if      (data.game_status === 'waiting')  renderWaiting(data);
    else if (data.game_status === 'finished') renderFinished(data);
    else                                       renderActive(data);
}

// ── WAITING ────────────────────────────────────────────────────────────────
function renderWaiting(data) {
    document.getElementById('mainView').innerHTML = `
        <div class="card waiting-card">
            <div class="waiting-icon">🔒</div>
            <div class="waiting-title">${data.theme_title || 'Mystery'}</div>
            <div class="waiting-desc">${data.short_description || 'Trust no one.'}</div>
            <div class="waiting-char">${data.character_name}</div>
            <p style="font-size:13px;color:var(--muted);margin-bottom:14px;">Your secret identity is ready. Waiting for the host to begin…</p>
            <div class="waiting-stats">
                <span class="stat-pill">🔪 ${data.killers_count} Killer${data.killers_count!==1?'s':''}</span>
                <span class="stat-pill">🤝 ${data.accomplice_count} Accomplice${data.accomplice_count!==1?'s':''}</span>
            </div>
        </div>`;
}

// ── ACTIVE ─────────────────────────────────────────────────────────────────
function renderActive(data) {
    const view = document.getElementById('mainView');
    view.innerHTML = '';

    // Dead screen
    if (data.is_dead) {
        view.innerHTML += buildDeadPanel(data);
    }

    // Ghost clues received
    if (data.received_ghost_clues?.length > 0) {
        let ghosts = `<div class="card"><div class="card-title">👻 Messages from the Beyond</div>`;
        data.received_ghost_clues.forEach(g => {
            ghosts += `<div class="ghost-item"><div class="ghost-from">From ${g.character_name}</div>${g.ghost_clue}</div>`;
        });
        ghosts += `</div>`;
        view.innerHTML += ghosts;
    }

    // Role alerts
    view.innerHTML += buildAlerts(data);

    // Story
    if (data.active_story?.background) {
        view.innerHTML += `
            <div class="card">
                <div class="card-title">📖 The Setting</div>
                <div class="story-block"><div class="story-label">Background</div><div class="story-text">${data.active_story.background}</div></div>
                ${data.active_story.the_murder ? `<div class="story-block"><div class="story-label">The Murder</div><div class="story-text">${data.active_story.the_murder}</div></div>` : ''}
            </div>`;
    }

    // Role sheet
    view.innerHTML += `
        <div class="card">
            <div class="card-title">🎭 Your Secret Identity</div>
            <div class="role-text">${data.role_description || ''}</div>
        </div>`;

    // Action panels (killer, poisoner, spy) — only if alive
    if (!data.is_dead) {
        if (data.is_killer)   view.innerHTML += buildKillerPanel(data);
        if (data.is_poisoner) view.innerHTML += buildPoisonerPanel(data);
        if (data.is_spy)      view.innerHTML += buildSpyPanel(data);
    }

    // Public clues (round 3 only)
    const pubClues = (data.active_story?.public_clues || []).filter(c => c.round <= data.current_round);
    if (pubClues.length > 0) {
        let pub = `<div class="card"><div class="card-title">📢 Public Announcement</div>`;
        pubClues.forEach(c => {
            pub += `<div class="public-clue"><div class="public-clue-label">Round ${c.round} — Everyone sees this</div><div class="public-clue-text">${c.content}</div></div>`;
        });
        pub += `</div>`;
        view.innerHTML += pub;
    }

    // Private clues
    const clues = data.available_clues || [];
    let clueHtml = `<div class="card"><div class="card-title">🔍 Your Evidence</div>`;
    if (clues.length === 0) {
        clueHtml += `<p class="clue-empty">No evidence uncovered yet. Wait for the host to release Round 2.</p>`;
    } else {
        clues.forEach(c => {
            clueHtml += `<div class="clue-item"><div class="clue-round">Round ${c.round_number} — Private</div>${c.content}</div>`;
        });
    }
    clueHtml += `</div>`;
    view.innerHTML += clueHtml;

    // Exile vote (Round 2 only, alive players)
    if (data.current_round === 2 && !data.is_dead) {
        view.innerHTML += buildExilePanel(data);
    }

    // Notebook
    view.innerHTML += buildNotebook(data);

    // Voting (Round 3, alive)
    if (data.current_round >= 3 && !data.is_dead) {
        view.innerHTML += buildVotePanel(data);
    }

    // Re-attach listeners
    attachListeners(data);
}

// ── Panel builders ─────────────────────────────────────────────────────────
function buildAlerts(data) {
    let html = '';
    if (data.is_killer) html += `
        <div class="alert alert-killer">
            <div class="alert-title">🔪 You are the Killer</div>
            <div class="alert-body">Deflect suspicion. Use your assassination panel to eliminate a target before each round. You do NOT know who your accomplice is.</div>
        </div>`;
    if (data.is_poisoner) html += `
        <div class="alert alert-evil">
            <div class="alert-title">☠️ You are the Poisoner</div>
            <div class="alert-body">You are an accomplice. Protect the killer at all costs — and corrupt the evidence.<div class="secret-pill">Killer: ${data.known_killer}</div></div>
        </div>`;
    else if (data.is_accomplice) html += `
        <div class="alert alert-evil">
            <div class="alert-title">🤝 You are the Accomplice</div>
            <div class="alert-body">Protect the killer. Feed disinformation. Take the fall if needed.<div class="secret-pill">Killer: ${data.known_killer}</div></div>
        </div>`;
    if (data.is_investigator) html += `
        <div class="alert alert-special">
            <div class="alert-title">🔎 You are the Investigator</div>
            <div class="alert-body">Your Round 3 clue will name exactly two suspects — one is the killer. Use it to anchor the group's final vote.</div>
        </div>`;
    if (data.is_drunk) html += `
        <div class="alert alert-paranoid">
            <div class="alert-title">🍺 You are the Drunk</div>
            <div class="alert-body">You think you're a normal innocent. But your clues are completely false — though you have no way of knowing that.</div>
        </div>`;
    if (data.is_paranoid) html += `
        <div class="alert alert-paranoid">
            <div class="alert-title">🧠 You are the Paranoid</div>
            <div class="alert-body">Your gut screams the truth and it never lies. Trust your instincts above all the clues.</div>
        </div>`;
    if (data.is_spy) html += `
        <div class="alert alert-special">
            <div class="alert-title">🕵️ You are the Spy</div>
            <div class="alert-body">Once per game, you may secretly learn the true role of one other player. Use your spy panel wisely — you only get one chance.</div>
        </div>`;
    if (data.is_fool) html += `
        <div class="alert alert-fool">
            <div class="alert-title">🃏 You are the… Killer?</div>
            <div class="alert-body">You have a motive. You had the means. You had the plan. But you didn't do it.<br><br>Play your role as written. You are innocent — but nobody will believe you.</div>
        </div>`;
    return html;
}

function buildKillerPanel(data) {
    const opts = (data.notebook || []).filter(p => !p.is_publicly_dead).map(p =>
        `<option value="${p.character_name}">${p.character_name} (${p.claimed_by || '?'})</option>`
    ).join('');
    return `
        <div class="action-panel panel-killer" id="killerPanel">
            <div class="panel-title">🔪 Assassination Protocol</div>
            <div class="panel-desc">Select your target. They drop dead at the start of the next round. You can change your mind until the host advances.</div>
            <select id="killTarget"><option value="">— Select target —</option>${opts}</select>
            <button class="btn btn-killer" onclick="eliminateTarget()">Lock in target</button>
            <div class="confirm-msg" id="killConfirm" style="color:var(--danger);"></div>
        </div>`;
}

function buildPoisonerPanel(data) {
    const opts = (data.notebook || []).filter(p => !p.is_publicly_dead).map(p =>
        `<option value="${p.character_name}">${p.character_name}</option>`
    ).join('');
    const locked = data.poison_target ? `<div class="confirm-msg" style="color:var(--accent);">☠️ Locked: ${data.poison_target}</div>` : '';
    return `
        <div class="action-panel panel-poisoner" id="poisonerPanel">
            <div class="panel-title">☠️ Poison Protocol</div>
            <div class="panel-desc">Choose one player. Their next clue will be silently corrupted when the round releases. Resets each round.</div>
            <select id="poisonTarget"><option value="">— Select target —</option>${opts}</select>
            <button class="btn btn-poisoner" onclick="poisonPlayer()">Lock in poison target</button>
            <div class="confirm-msg" id="poisonConfirm" style="color:var(--accent);">${data.poison_target ? '☠️ Locked: '+data.poison_target : ''}</div>
        </div>`;
}

function buildSpyPanel(data) {
    if (data.spy_used) {
        return `
            <div class="action-panel panel-spy">
                <div class="panel-title">🕵️ Intelligence Report</div>
                <div class="panel-desc">Ability used.</div>
                <div class="confirm-msg" style="color:var(--accent2);">${data.spy_result || ''}</div>
            </div>`;
    }
    const opts = (data.notebook || []).map(p =>
        `<option value="${p.character_name}">${p.character_name}</option>`
    ).join('');
    return `
        <div class="action-panel panel-spy" id="spyPanel">
            <div class="panel-title">🕵️ Spy Ability</div>
            <div class="panel-desc">Choose one player to investigate. You will learn their true role. One use only — choose carefully.</div>
            <select id="spyTarget"><option value="">— Select player —</option>${opts}</select>
            <button class="btn btn-spy" onclick="spyPeek()">Investigate</button>
            <div class="confirm-msg" id="spyConfirm" style="color:var(--accent2);"></div>
        </div>`;
}

function buildExilePanel(data) {
    const opts = (data.notebook || []).filter(p => !p.is_publicly_dead).map(p =>
        `<option value="${p.character_name}">${p.character_name} (${p.claimed_by || '?'})</option>`
    ).join('');
    return `
        <div class="action-panel panel-exile" id="exilePanel">
            <div class="panel-title">⚖️ Exile Vote</div>
            <div class="panel-desc">Propose someone to exile before the final round. If the majority agree, they leave — publicly, not as a murder. Be careful: exiling an innocent helps the killer.</div>
            <select id="exileTarget"><option value="">— Nominate a suspect —</option>${opts}</select>
            <button class="btn btn-exile" onclick="nominateExile()">Cast exile vote</button>
            <div class="exile-tally" id="exileTally"></div>
            <div class="exile-bar"><div class="exile-bar-fill" id="exileBarFill" style="width:0%"></div></div>
            <div class="confirm-msg" id="exileConfirm" style="color:var(--warn);"></div>
        </div>`;
}

function buildDeadPanel(data) {
    const sentAlready = data.ghost_clue_recipient;
    const livingOpts  = (data.notebook || []).filter(p => !p.is_publicly_dead).map(p =>
        `<option value="${p.character_name}">${p.character_name}</option>`
    ).join('');
    const senderSection = sentAlready
        ? `<div class="confirm-msg" style="color:var(--teal);">✓ Ghost clue sent to ${data.ghost_clue_recipient}</div>`
        : `<select id="ghostTarget"><option value="">— Select living player —</option>${livingOpts}</select>
           <button class="btn btn-ghost" onclick="sendGhostClue()">Send message from beyond</button>
           <div class="confirm-msg" id="ghostConfirm" style="color:var(--teal);"></div>`;
    return `
        <div class="alert alert-dead">
            <div class="alert-title">💀 You have been eliminated</div>
            <div class="alert-body" style="margin-bottom:12px;">You may still speak in person. Your one last act: send your ghost clue to a living player.</div>
            <div class="action-panel panel-ghost" style="margin-bottom:0;">
                <div class="panel-title">👻 Ghost Clue</div>
                <div class="panel-desc" style="color:var(--text);">${data.ghost_clue || 'No ghost clue available.'}</div>
                ${senderSection}
            </div>
        </div>`;
}

function buildNotebook(data) {
    if (!data.notebook?.length) return '';
    let html = `<div class="card"><div class="card-title">📓 Notebook</div>`;
    data.notebook.forEach(p => {
        const note   = p.my_note || {};
        const status = note.status || 'neutral';
        const dead   = p.is_publicly_dead ? ' nb-dead' : '';
        html += `
            <div class="notebook-entry${dead}">
                <div class="nb-info">
                    <div class="nb-name">${p.character_name}${p.is_publicly_dead ? ' 💀' : ''}</div>
                    <div class="nb-desc">${p.claimed_by ? p.claimed_by + ' · ' : ''}${p.public_summary || ''}</div>
                </div>
                <div class="nb-status">
                    <button class="status-btn ${status==='sus'?'active-sus':''}" title="Suspicious"
                        onclick="setNote('${p.character_name}', 'sus')">🔴</button>
                    <button class="status-btn ${status==='alright'?'active-alright':''}" title="Alright"
                        onclick="setNote('${p.character_name}', 'alright')">🟢</button>
                </div>
            </div>`;
    });
    return html + '</div>';
}

function buildVotePanel(data) {
    const opts = (data.notebook || []).filter(p => !p.is_publicly_dead).map(p =>
        `<option value="${p.character_name}">${p.character_name} (${p.claimed_by || '?'})</option>`
    ).join('');
    const voted = data.voted_for
        ? `<div class="confirm-msg" style="color:var(--accent);margin-top:10px;">🗳️ Voted for: ${data.voted_for}</div>`
        : '';
    return `
        <div class="card">
            <div class="card-title">🗳️ Final Accusation</div>
            <p style="font-size:13px;color:var(--muted);margin-bottom:12px;">Who is the killer? You can change your vote until the host ends the game.</p>
            <select id="suspectList"><option value="">— Select your accusation —</option>${opts}</select>
            <button class="btn btn-vote" onclick="submitVote()">Lock in vote</button>
            ${voted}
        </div>`;
}

// ── FINISHED ───────────────────────────────────────────────────────────────
function renderFinished(data) {
    const r = data.reveal_data;
    if (!r) return;
    const view = document.getElementById('mainView');

    const bannerClass = r.killer_caught ? 'win-innocent' : 'win-killer';
    const bannerText  = r.killer_caught ? '🏆 Innocents Win — The killer was caught!' : '🔪 The Killer Escaped!';

    let votesHtml = '';
    if (r.votes?.length) {
        r.votes.forEach(v => {
            votesHtml += `
                <div class="vote-row">
                    <span class="vote-tick">${v.is_correct ? '✅' : '❌'}</span>
                    <span class="vote-voter">${v.voter}</span>
                    <span class="vote-target">accused ${v.target}</span>
                </div>`;
        });
    } else {
        votesHtml = `<p style="color:var(--muted);font-size:13px;">Nobody cast a vote.</p>`;
    }

    let identitiesHtml = '';
    (r.true_identities || []).forEach(p => {
        let pill = '';
        if      (p.is_killer)       pill = `<span class="role-pill rp-killer">🔪 Killer</span>`;
        else if (p.is_poisoner)     pill = `<span class="role-pill rp-poisoner">☠️ Poisoner</span>`;
        else if (p.is_accomplice)   pill = `<span class="role-pill rp-accomplice">🤝 Accomplice</span>`;
        else if (p.is_investigator) pill = `<span class="role-pill rp-investigator">🔎 Investigator</span>`;
        else if (p.is_drunk)        pill = `<span class="role-pill rp-drunk">🍺 Drunk</span>`;
        else if (p.is_paranoid)     pill = `<span class="role-pill rp-paranoid">🧠 Paranoid</span>`;
        else if (p.is_spy)          pill = `<span class="role-pill rp-spy">🕵️ Spy</span>`;
        else if (p.is_fool)         pill = `<span class="role-pill rp-fool">🃏 Fool</span>`;
        else                        pill = `<span class="role-pill rp-innocent">😇 Innocent</span>`;
        identitiesHtml += `
            <div class="identity-row">
                <div><div class="id-name">${p.name}</div><div class="id-player">${p.player || '—'}</div></div>
                <div>${pill}</div>
            </div>`;
    });

    view.innerHTML = `
        <div class="winner-banner ${bannerClass}">${bannerText}</div>

        ${r.recap ? `
        <div class="recap-card">
            <div class="card-title" style="margin-bottom:12px;">📖 The Story of What Really Happened</div>
            <div class="recap-text">${r.recap}</div>
        </div>` : ''}

        <div class="card">
            <div class="card-title">🔍 The Solution</div>
            <div class="story-text">${r.master_story?.the_solution || '—'}</div>
        </div>

        <div class="card">
            <div class="card-title">🗳️ Final Votes</div>
            ${votesHtml}
        </div>

        <div class="card">
            <div class="card-title">🎭 True Identities</div>
            ${identitiesHtml}
        </div>`;
}

// ── Action functions ───────────────────────────────────────────────────────
function attachListeners(data) {
    // Restore selects to current locked values
    const killEl = document.getElementById('killTarget');
    // (values restored via panel builders, nothing extra needed)
}

async function eliminateTarget() {
    const target = document.getElementById('killTarget')?.value;
    if (!target) return;
    const res  = await fetch(`/player/eliminate/${accessKey}?target_character=${encodeURIComponent(target)}`, { method: 'POST' });
    const data = await res.json();
    document.getElementById('killConfirm').innerText = res.ok ? `🔪 Locked: ${target}` : data.detail;
}

async function poisonPlayer() {
    const target = document.getElementById('poisonTarget')?.value;
    if (!target) return;
    const res  = await fetch(`/player/poison/${accessKey}?target_character=${encodeURIComponent(target)}`, { method: 'POST' });
    const data = await res.json();
    document.getElementById('poisonConfirm').innerText = res.ok ? `☠️ Locked: ${target}` : data.detail;
}

async function spyPeek() {
    const target = document.getElementById('spyTarget')?.value;
    if (!target) return;
    const res  = await fetch(`/player/spy/${accessKey}?target_character=${encodeURIComponent(target)}`, { method: 'POST' });
    const data = await res.json();
    if (res.ok) {
        document.getElementById('spyConfirm').innerText = `🕵️ ${data.target} is: ${data.role}`;
        document.getElementById('spyPanel').querySelector('select').disabled = true;
        document.getElementById('spyPanel').querySelector('button').disabled = true;
    } else {
        document.getElementById('spyConfirm').innerText = data.detail;
    }
}

async function nominateExile() {
    const target = document.getElementById('exileTarget')?.value;
    if (!target) return;
    // Get current game_id from access key via dashboard — we stored it on load
    const res  = await fetch(`/player/exile-nominate/${accessKey}?target_character=${encodeURIComponent(target)}`, { method: 'POST' });
    const data = await res.json();
    if (res.ok) {
        if (data.exiled) {
            document.getElementById('exileConfirm').innerText = `⚖️ ${data.target} has been exiled!`;
            fetchData();
        } else {
            document.getElementById('exileConfirm').innerText = data.message;
            // Also fetch tally
            fetchExileTally();
        }
    } else {
        document.getElementById('exileConfirm').innerText = data.detail || 'Error';
    }
}

async function fetchExileTally() {
    // We need the game_id — fetch it from dashboard quickly
    const dash = await fetch(`/player/dashboard/${accessKey}`).then(r => r.json());
    if (!dash) return;
    // Get exile status
    const res  = await fetch(`/player/exile-status/${dash.game_id}`);
    const data = await res.json();
    const tally = data.tally || {};
    const needed = data.needed || 1;
    const alive  = data.alive_count || 1;
    const exileEl = document.getElementById('exileTally');
    const barEl   = document.getElementById('exileBarFill');
    if (!exileEl) return;
    let tallyText = Object.entries(tally).map(([name, count]) =>
        `${name}: ${count}/${Math.ceil(needed)} votes`
    ).join(' · ') || 'No votes yet';
    exileEl.innerText = tallyText;
    // Show bar for currently selected target
    const sel = document.getElementById('exileTarget')?.value;
    if (sel && tally[sel] !== undefined) {
        barEl.style.width = Math.min(100, (tally[sel] / needed) * 100) + '%';
    }
}

async function sendGhostClue() {
    const target = document.getElementById('ghostTarget')?.value;
    if (!target) return;
    const res  = await fetch(`/player/send-ghost-clue/${accessKey}?target_character=${encodeURIComponent(target)}`, { method: 'POST' });
    const data = await res.json();
    if (res.ok) {
        document.getElementById('ghostConfirm').innerText = `✓ Sent to ${target}`;
        document.getElementById('ghostTarget').disabled = true;
    } else {
        document.getElementById('ghostConfirm').innerText = data.detail;
    }
}

async function submitVote() {
    const suspect = document.getElementById('suspectList')?.value;
    if (!suspect) return;
    const res  = await fetch(`/player/vote/${accessKey}?suspect=${encodeURIComponent(suspect)}`, { method: 'POST' });
    const data = await res.json();
    if (res.ok) fetchData();
}

async function setNote(character, status) {
    await fetch(`/player/notes/${accessKey}?target_character=${encodeURIComponent(character)}&status=${status}&note_text=`, { method: 'POST' });
    fetchData();
}

// ── Boot ───────────────────────────────────────────────────────────────────
fetchData();
startAutoSync();
</script>
